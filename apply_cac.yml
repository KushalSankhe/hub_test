---
- name: Apply GitOps Configuration using infra.aap_configuration
  hosts: localhost
  connection: local
  gather_facts: false

  vars:
    controller_validate_certs: false
    controller_projects_async: false      # ← KEY FIX: disables async for projects
    controller_inventories_async: false   # ← same for inventories
    controller_templates_async: false     # ← same for templates

  environment:
    CONTROLLER_VERIFY_SSL: "false"

  tasks:
    - name: Read the CaC definitions into memory
      ansible.builtin.include_vars:
        file: "{{ playbook_dir }}/aap_config.yml"

    - name: Create Inventories
      ansible.builtin.include_role:
        name: infra.aap_configuration.controller_inventories

    - name: Create Projects
      ansible.builtin.include_role:
        name: infra.aap_configuration.controller_projects

    - name: Create Job Templates
      ansible.builtin.include_role:
        name: infra.aap_configuration.controller_templates