---
- name: Apply GitOps Configuration using infra.aap_configuration
  hosts: localhost
  connection: local
  gather_facts: false

  environment:
    CONTROLLER_VERIFY_SSL: false
  # THIS IS THE FIX: It forces the float timeout across all AAP modules
  module_defaults:
    group/ansible.controller.controller:
      request_timeout: 60.0

  tasks:
    - name: Read the CaC definitions into memory
      ansible.builtin.include_vars:
        file: "./aap_config.yml"

    - name: Dispatch the configuration to AAP
      ansible.builtin.include_role:
        name: infra.aap_configuration.dispatch