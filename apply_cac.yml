---
- name: Apply GitOps Configuration using infra.aap_configuration
  hosts: localhost
  connection: local
  gather_facts: false

  vars:
    controller_validate_certs: false   # belt-and-suspenders for the collection

  environment:
    CONTROLLER_VERIFY_SSL: "false"
    CONTROLLER_TIMEOUT: "60.0"
    AAP_REQUEST_TIMEOUT: "60.0"

  tasks:
    - name: Read the CaC definitions into memory
      ansible.builtin.include_vars:
        file: "{{ playbook_dir }}/aap_config.yml"   # absolute path — safer when run from AAP

    - name: Dispatch the configuration to AAP
      ansible.builtin.include_role:
        name: infra.aap_configuration.dispatch