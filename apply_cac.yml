---
- name: Apply GitOps Configuration using infra.aap_configuration
  hosts: localhost
  connection: local
  gather_facts: false

  vars:
    controller_validate_certs: false

    # Generic async settings (fallback for all roles)
    controller_configuration_async_retries: 120
    controller_configuration_async_delay: 5

    # Project-specific async settings (the role uses these exact names)
    controller_configuration_projects_async_retries: 120
    controller_configuration_projects_async_delay: 5

    # Workaround for the int-as-bool deprecation bug in older collection versions:
    # Disable async entirely for projects — run synchronously instead
    controller_projects_async: false

  environment:
    CONTROLLER_VERIFY_SSL: "false"

  tasks:
    - name: Read the CaC definitions into memory
      ansible.builtin.include_vars:
        file: "./aap_config.yml"

    - name: Dispatch the configuration to AAP
      ansible.builtin.include_role:
        name: infra.aap_configuration.dispatch