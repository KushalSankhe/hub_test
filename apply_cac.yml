---
- name: Apply GitOps Configuration using infra.aap_configuration
  hosts: localhost
  connection: local
  gather_facts: false

  vars:
    controller_validate_certs: false
    # THIS IS THE FIX: Tell the async tasks to wait much longer
    # 120 retries * 5 seconds = 10 minutes of total wait time
    controller_configuration_async_retries: 120
    controller_configuration_async_delay: 5

  environment:
    CONTROLLER_VERIFY_SSL: "false"

  tasks:
    - name: Read the CaC definitions into memory
      ansible.builtin.include_vars:
        file: "./aap_config.yml"

    - name: Dispatch the configuration to AAP
      ansible.builtin.include_role:
        name: infra.aap_configuration.dispatch