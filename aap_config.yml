---
# 1. Define the Inventory Structure
controller_inventories:
  - name: "Givaudan Test Inventory"
    description: "UAT and Dev testing inventory for automation workflows"
    organization: "Default"

# 2. Connect AAP to your public GitHub Repository
controller_projects:
  - name: "Hub Test 2"
    description: "Repository containing ServiceNow and testing playbooks"
    organization: "Default"
    scm_type: "git"
    scm_url: "https://github.com/KushalSankhe/hub_test.git"
    scm_branch: "main"
    scm_update_on_launch: true

# 3. Create Job Templates for all playbooks
controller_templates:
  - name: "Testing Service Now"
    description: "Template to test ServiceNow integration playbooks"
    job_type: "run"
    inventory: "Givaudan Test Inventory"
    project: "Hub Test 2"          # Fixed: was "Hub Test"
    playbook: "test_snow.yml"
    verbosity: 0
    job_slice_count: 1

  - name: "Check EE Collections"
    description: "Lists all collections installed inside the Execution Environment"
    job_type: "run"
    inventory: "Givaudan Test Inventory"
    project: "Hub Test 2"
    playbook: "check_ee.yml"
    verbosity: 0
    job_slice_count: 1

  - name: "Check Collection Version"
    description: "Verifies active collection versions inside the EE"
    job_type: "run"
    inventory: "Givaudan Test Inventory"
    project: "Hub Test 2"
    playbook: "check_version.yml"
    verbosity: 0
    job_slice_count: 1

  - name: "Test POSIX"
    description: "Runs ansible.posix collection tests"
    job_type: "run"
    inventory: "Givaudan Test Inventory"
    project: "Hub Test 2"
    playbook: "test_posix.yml"
    verbosity: 0
    job_slice_count: 1

  - name: "Test Community General"
    description: "Runs community.general collection tests"
    job_type: "run"
    inventory: "Givaudan Test Inventory"
    project: "Hub Test 2"
    playbook: "test_community.yml"
    verbosity: 0
    job_slice_count: 1