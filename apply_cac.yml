---
- name: Apply GitOps Configuration using infra.aap_configuration
  hosts: localhost
  connection: local
  gather_facts: false

  # THIS IS THE TRUE FIX FOR ASYNC TASKS:
  # We explicitly override the corrupted sandbox variables here.
  # Note: The quotes around "60.0" are mandatory so YAML parses them as strings for the environment!
  environment:
    CONTROLLER_VERIFY_SSL: false
    CONTROLLER_TIMEOUT: 60.0
    AAP_REQUEST_TIMEOUT: 60.0

  tasks:
    - name: Read the CaC definitions into memory
      ansible.builtin.include_vars:
        file: "./aap_config.yml"

    - name: Dispatch the configuration to AAP
      ansible.builtin.include_role:
        name: infra.aap_configuration.dispatch