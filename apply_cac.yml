---
- name: Apply GitOps Configuration to AAP
  hosts: localhost
  connection: local
  gather_facts: false

  environment:
    CONTROLLER_VERIFY_SSL: false

  tasks:
    - name: Read the CaC definitions
      ansible.builtin.include_vars:
        file: "./aap_config.yml"
        name: config_assets

    - name: Push all infrastructure elements to AAP
      ansible.controller.import:
        assets: "{{ config_assets }}"
        # Explicitly setting a float overrides the string conversion bug
        request_timeout: 60.0